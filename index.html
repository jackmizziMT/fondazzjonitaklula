<!DOCTYPE html>
<html lang="mt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondazzjoni ta' Klula</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Fondazzjoni ta' Klula</div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Ħidma għall-Komunità</h1>
            <p>Welcome to the official home of Fondazzjoni ta' Klula. We are currently building our digital presence.</p>
        </section>

        <section id="contact">
            <h2>Ikkuntatjana</h2>
            <form action="https://formspree.io/f/xoqyyreq" method="POST">
                <input type="text" name="name" placeholder="Isem" required>
                <input type="email" name="email" placeholder="Email" required>
                <textarea name="message" placeholder="Il-messaġġ tiegħek" required></textarea>
                <button type="submit">Ibgħat</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Fondazzjoni ta' Klula. All rights reserved.</p>
    </footer>

</body>
</html>
